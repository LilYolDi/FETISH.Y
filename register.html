<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">Y-FETISH</div>
</header>

<div class="form">

    <h2>Регистрация</h2>

    <input
        type="text"
        id="username"
        placeholder="Имя"
        required>

    <input
        type="email"
        id="email"
        placeholder="Email"
        required>

    <input
        type="password"
        id="password"
        placeholder="Пароль"
        required>

    <button id="registerBtn">
        Зарегистрироваться
    </button>

    <p>
        Уже есть аккаунт?
        <a href="login.html">Войти</a>
    </p>

</div>

<script src="register.js"></script>

</body>
</html>

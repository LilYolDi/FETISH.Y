<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой профиль</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">
Y-FETISH
</div>

</header>

<div class="profile">

<img id="avatar"
src="https://via.placeholder.com/140"
class="avatar">

<input
type="file"
id="avatarInput"
accept="image/*">

<h2 id="profileName">Имя</h2>

<p><b>Email:</b></p>
<p id="profileEmail"></p>

<p><b>Возраст:</b></p>
<input
type="number"
id="age"
placeholder="Возраст">

<p><b>Город:</b></p>

<select id="city">

<option>Ивано-Франковск</option>
<option>Львов</option>
<option>Киев</option>
<option>Одесса</option>
<option>Днепр</option>

</select>

<p><b>О себе</b></p>

<textarea
id="about"
placeholder="Расскажите о себе"></textarea>

<button id="saveProfile">
Сохранить профиль
</button>

<br><br>

<button onclick="location.href='index.html'">
На главную
</button>

</div>

<script src="profile.js"></script>

</body>
</html>
